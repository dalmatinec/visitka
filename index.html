<!DOCTYPE html>
<html lang="ru">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Lady Shop</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>


  <!-- Размытие -->
  <div class="bg-blur"></div>

  <!-- Курсор -->
  <div class="cursor"></div>

  <!-- HERO -->
  <section class="hero">

    <!-- Лого -->
    <div class="coin-wrapper">

      <div class="coin">
        <img src="logo.jpg" alt="logo">
      </div>

    </div>

    <!-- Заголовок -->
    <h1 class="title">

      <span>Lady</span>

      <img
        src="crystal.png"
        alt=""
        class="title-crystal"
      >

      <span>Shop</span>

    </h1>

    <!-- Подзаголовок -->
    <p class="subtitle">
      Сохраняйте сайт в закладки для постоянного доступа к нашим ресурсам
    </p>

  </section>

  <!-- Ссылки -->
  <section class="links-section">

    <h2>Актуальные ссылки</h2>

    <div class="links">

      <!-- Оператор -->
      <a
        href="https://t.me/Lady_MW"
        class="glass-btn"
        target="_blank"
      >

        <img src="link.png" class="btn-icon">

        <span>Оператор </span>

      </a>

      <!-- Чат -->
      <a
        href="https://t.me/+Mi-d4zyrF8ZkNTQy"
        class="glass-btn"
        target="_blank"
      >

        <img src="link.png" class="btn-icon">

        <span>Чат</span>

      </a>

      <!-- Канал -->
      <a
        href="https://t.me/+6e-jF1e4Lq01NGQy"
        class="glass-btn"
        target="_blank"
      >

        <img src="link.png" class="btn-icon">

        <span>Канал</span>

      </a>


      <!-- Бот -->
      <a
        href="https://t.me/LadyAtashop_bot"
        class="glass-btn"
        target="_blank"
      >

        <img src="link.png" class="btn-icon">

        <span>Наш бот</span>

      </a>

    </div>

  </section>

  <!-- Footer -->
  <footer>
    Lady Shop 2026
  </footer>

  <script src="script.js"></script>

</body>
</html>
